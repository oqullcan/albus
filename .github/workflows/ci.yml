name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            native_binding_smoke: true
          - os: windows-latest
            native_binding_smoke: false
          - os: macos-latest
            native_binding_smoke: true
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@1.94.0
        with:
          components: clippy,rustfmt
      - name: Install Linux native-binding dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y dbus-x11 gnome-keyring libdbus-1-dev pkg-config
      - name: Prepare macOS keychain for smoke tests
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          security create-keychain -p "" albus-ci.keychain
          security default-keychain -s albus-ci.keychain
          security unlock-keychain -p "" albus-ci.keychain
          security set-keychain-settings -lut 21600 albus-ci.keychain
          security list-keychains -d user -s albus-ci.keychain login.keychain-db
      - name: Format
        if: matrix.os == 'ubuntu-latest'
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings
      - name: Test (Linux Secret Service smoke)
        if: matrix.os == 'ubuntu-latest'
        env:
          ALBUS_RUN_NATIVE_BINDING_SMOKE: ${{ matrix.native_binding_smoke }}
        shell: bash
        run: |
          dbus-run-session -- bash -lc 'eval "$(gnome-keyring-daemon --start --components=secrets)"; cargo test --workspace --locked'
      - name: Test
        if: matrix.os != 'ubuntu-latest'
        env:
          ALBUS_RUN_NATIVE_BINDING_SMOKE: ${{ matrix.native_binding_smoke }}
        run: cargo test --workspace --locked
      - name: Docs
        if: matrix.os == 'ubuntu-latest'
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --workspace --no-deps --locked

  security-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@1.94.0
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Audit dependencies
        run: cargo audit

  release-verify:
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@1.94.0
      - name: Verify release build
        run: cargo build --workspace --release --locked
